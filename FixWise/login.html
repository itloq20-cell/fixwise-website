<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FixWise-Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="phone-frame">
  <div class="notch"></div>

  <div class="auth-screen">
    <div class="auth-top-box">
      <h1>FixWise</h1>
    </div>

    <div class="auth-card">

      <div class="auth-tabs">
        <a href="signup.html" class="tab">Create Account</a>
        <a href="login.html" class="tab active">Log In</a>
      </div>

      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Fill out the information below in order to access your account.</p>
      </div>

      <form class="auth-form">
        <div class="input-box">
          <input type="email" placeholder="Email">
        </div>
        <div class="input-box password-box">
          <input type="password" placeholder="Password">
          <i class="fa-regular fa-eye-slash"></i>
        </div>
        <button class="primary-btn">Sign In</button>
      </form>
      <p class="social-text">Or sign in with</p>
      <div class="social-buttons">
        <a href="#" class="social-btn">
          <i class="fa-brands fa-google"></i>
          Continue with Google
        </a>
        <a href="#" class="social-btn">
          <i class="fa-brands fa-apple"></i>
          Continue with Apple
        </a>
      </div>

    </div>
  </div>
</div>

</body>
</html>
